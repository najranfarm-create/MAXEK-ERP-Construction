# Nginx site config for erp.maxekindia.com
# Install: scripts/fix-production-routing.sh (does NOT touch /var/www/maxek-erp app code)
#
# Static files are served directly by Nginx from the original ERP tree.
# All other requests proxy to Gunicorn on 127.0.0.1:8000.

server {
    listen 80;
    listen [::]:80;
    server_name erp.maxekindia.com;

    # Certbot / Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name erp.maxekindia.com;

    # Adjust paths if your certs live elsewhere (certbot default shown)
    ssl_certificate     /etc/letsencrypt/live/erp.maxekindia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.maxekindia.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # ── Static assets (fixes 404 on /static/css/maxek-login.css) ──
    # Must use alias with trailing slashes. Do NOT proxy /static/ to Gunicorn.
    location /static/ {
        alias /var/www/maxek-erp/static/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Application (Gunicorn) ──
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
    }
}
